name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Python with flake8
        run: |
          pip install flake8
          flake8 api/ worker/ --max-line-length=120

      - name: Lint JavaScript with eslint
        run: |
          cd frontend
          npm install eslint
          npx eslint . || true

      - name: Lint Dockerfile api
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: error

      - name: Lint Dockerfile frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: error

      - name: Lint Dockerfile worker
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          failure-threshold: error

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run pytest with coverage
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          cd api
          pytest tests/ --cov=. --cov-report=xml --cov-report=html -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/htmlcov/

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image to local registry
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: localhost:5000/api:${{ github.sha }},localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image to local registry
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: localhost:5000/frontend:${{ github.sha }},localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image to local registry
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: localhost:5000/worker:${{ github.sha }},localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: localhost:5000/api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: '1'

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: localhost:5000/frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: '1'

      - name: Scan worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: localhost:5000/worker:${{ github.sha }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: '1'

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-api.sarif

  build:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image with cache
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: api:${{ github.sha }},api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image with cache
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: frontend:${{ github.sha }},frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image with cache
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          tags: worker:${{ github.sha }},worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify images exist
        run: docker images

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for all services healthy
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:3000/health && curl -sf http://localhost:8000/health; do echo "Waiting..."; sleep 5; done'
          echo "All services healthy!"

      - name: Test health endpoints
        run: |
          curl -f http://localhost:3000/health
          curl -f http://localhost:8000/health

      - name: Submit job and verify completion
        run: |
          JOB_RESPONSE=$(curl -sf -X POST http://localhost:3000/submit)
          echo "Submit response: $JOB_RESPONSE"
          JOB_ID=$(echo $JOB_RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"
          for i in {1..30}; do
            STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 2
          done
          echo "Job did not complete in time"
          docker compose logs
          exit 1

      - name: Teardown stack
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build updated images
        run: docker compose build

      - name: Rolling update deploy
        run: bash deploy.sh

      - name: Verify deployment health
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:3000/health; do echo "Waiting for deployment..."; sleep 3; done'
          echo "Deployment healthy!"
